<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC 26 PRO - ADMIN PANEL ADDED</title>
    <style>
        :root {
            --gold: #f1c40f;
            --bg: #010a14;
            --bg-90: linear-gradient(135deg, #2c3e50, #000000);
            --bg-100: linear-gradient(135deg, #e67e22, #d35400);

            /* Reyting Fonlari */
            --bg-110: linear-gradient(135deg, #ff9f43, #ff5252);
            /* 🎊 */
            --bg-111: linear-gradient(135deg, #48dbfb, #1dd1a1);
            /* 🖼️ */
            --bg-112: linear-gradient(135deg, #00d2d3, #54a0ff);
            /* 💍 */
            --bg-113: linear-gradient(135deg, #ff9f43, #f1c40f);
            /* 🏆 */
            --bg-114: linear-gradient(135deg, #5f27cd, #341f97);
            /* 🧩 */
            --bg-115: linear-gradient(135deg, #00d2d3, #0a3d62);
            /* 💎 */
            --bg-116: linear-gradient(135deg, #ff6b6b, #ee5253);
            /* 🎮 */
            --bg-117: linear-gradient(135deg, #10ac84, #01a3a4);
            /* 🎨 */
            --bg-118: linear-gradient(135deg, #f1c40f, #2c3e50);
            /* 👑 */
            --bg-119: linear-gradient(135deg, #ee5253, #7f1d1d);
            /* 🚒 */
            --bg-120: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            /* 🌈 */
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .header {
            background: #0d1b2a;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 3px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .balance {
            color: var(--gold);
            font-size: 18px;
            font-weight: bold;
        }

        .pitch {
            width: 95%;
            max-width: 500px;
            height: 600px;
            background: #1e7e34 url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            margin: 10px auto;
            border: 3px solid #fff;
            position: relative;
            border-radius: 15px;
        }

        .slot {
            position: absolute;
            width: 58px;
            height: 82px;
            border: 1px dashed rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            z-index: 10;
        }

        .card {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card img {
            width: 100%;
            height: 75%;
            object-fit: cover;
            display: block;
        }

        .card-ovr {
            position: absolute;
            top: 2px;
            left: 4px;
            font-weight: 900;
            font-size: 13px;
            text-shadow: 1px 1px 2px #000;
            z-index: 2;
        }

        .card-stars {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 9px;
            color: var(--gold);
            text-shadow: 1px 1px 2px #000;
        }

        .card-emoji {
            position: absolute;
            bottom: 22px;
            right: 4px;
            font-size: 12px;
            z-index: 3;
            text-shadow: 1px 1px 2px #000;
        }

        .card-name {
            position: absolute;
            bottom: 0;
            width: 100%;
            font-size: 7px;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 2px 0;
            font-weight: bold;
        }

        .card-120 {
            animation: ultimate 3s infinite linear;
            background-size: 400% 400% !important;
        }

        @keyframes ultimate {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 10px;
        }

        .btn {
            padding: 12px 5px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            font-size: 10px;
            text-transform: uppercase;
        }

        .scroll-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            background: #0d1b2a;
            border-top: 2px solid var(--gold);
            min-height: 240px;
        }

        .inv-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            min-width: 85px;
        }

        .action-btn {
            border: none;
            border-radius: 4px;
            font-size: 8px;
            padding: 5px;
            cursor: pointer;
            width: 100%;
            color: white;
        }

        #penalty-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .goal-frame {
            width: 300px;
            height: 180px;
            border: 5px solid #fff;
            border-bottom: none;
            position: relative;
        }

        .keeper {
            width: 60px;
            height: 85px;
            background: url('https://cdn-icons-png.flaticon.com/512/805/805404.png') no-repeat center/contain;
            position: absolute;
            bottom: 0;
            left: 120px;
            transition: 0.3s;
        }

        .ball {
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            bottom: -110px;
            left: 135px;
            transition: 0.5s;
            z-index: 10;
        }

        .target {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            cursor: pointer;
            z-index: 20;
        }

        /* Admin Panel */
        #admin-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 4000;
            align-items: center;
            justify-content: center;
        }

        .admin-box {
            background: #0d1b2a;
            border: 2px solid var(--gold);
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
        }

        .admin-input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            margin: 10px 0;
            background: #1b2a4a;
            border: 1px solid var(--gold);
            color: #fff;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div><b>FC 26 PRO</b><br><span id="team-ovr" style="color:var(--gold)">OVR: 0</span></div>
        <div class="balance">🪙 <span id="coin">0</span> <span onclick="toggleAdmin(true)"
                style="cursor:pointer; font-size:12px; margin-left:10px; opacity:0.5">⚙️</span></div>
    </div>

    <div class="btn-group">
        <button class="btn" style="background:var(--gold); color:#000" onclick="openPack()">PACK (1k)</button>
        <button class="btn" style="background:#3498db" onclick="toggleMarket(true)">MARKET</button>
        <button class="btn" style="background:#27ae60" onclick="startPenalty()">PLAY</button>
        <button class="btn" style="background:#e74c3c" onclick="resetGame()">RESET</button>
    </div>

    <div class="pitch">
        <div class="slot" style="top:8%; left:10%" id="LW">LW</div>
        <div class="slot" style="top:4%; left:43%" id="ST">ST</div>
        <div class="slot" style="top:8%; left:76%" id="RW">RW</div>
        <div class="slot" style="top:30%; left:12%" id="LCM">CM</div>
        <div class="slot" style="top:35%; left:43%" id="CM">CM</div>
        <div class="slot" style="top:30%; left:74%" id="RCM">CM</div>
        <div class="slot" style="top:60%; left:5%" id="LB">LB</div>
        <div class="slot" style="top:65%; left:28%" id="LCB">CB</div>
        <div class="slot" style="top:65%; left:58%" id="RCB">CB</div>
        <div class="slot" style="top:60%; left:82%" id="RB">RB</div>
        <div class="slot" style="bottom:6%; left:43%" id="GK">GK</div>
    </div>

    <div class="scroll-area" id="inv-list"></div>

<div id="admin-panel">
    <div class="admin-box">
        <h2 style="color:var(--gold); text-align:center">ADMIN PANEL</h2>

        <!-- PAROL -->
        <input type="password" id="admin-password" class="admin-input" placeholder="Admin parol">

        <label>Coin O'zgartirish:</label>
        <input type="number" id="admin-coin-input" class="admin-input" placeholder="Tanga miqdori">

        <button class="btn" style="background:#27ae60; width:100%" onclick="adminSetCoin()">
            SAQLASH
        </button>

        <hr style="border-color:rgba(255,255,255,0.1)">

        <button class="btn" style="background:#3498db; width:100%; margin:5px 0" onclick="adminGivePlayer()">
            ADMIN PLAYER (+125 OVR)
        </button>

        <button class="btn" style="background:#e67e22; width:100%; margin:5px 0" onclick="adminClearInv()">
            INVENTARNI TOZALASH
        </button>

        <button class="btn" style="background:#e74c3c; width:100%; margin-top:20px" onclick="toggleAdmin(false)">
            YOPISH
        </button>
    </div>
</div>

    <div id="penalty-modal">
        <h2 style="color:var(--gold)">GOLLAR: <span id="pen-score">0</span></h2>
        <div class="goal-frame">
            <div class="keeper" id="gk-player"></div>
            <div class="target" style="top:10px; left:5px" onclick="shoot(1)"></div>
            <div class="target" style="top:10px; left:110px" onclick="shoot(2)"></div>
            <div class="target" style="top:10px; left:215px" onclick="shoot(3)"></div>
            <div class="ball" id="game-ball"></div>
        </div>
        <button class="btn" style="background:#e74c3c; padding:15px 40px; margin-top:140px"
            onclick="stopPenalty()">BONUSNI OLISH</button>
    </div>

    <div id="market-modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; overflow-y:auto; padding:20px;">
        <h1 style="color:var(--gold); text-align:center">MARKET</h1>
        <div id="market-list"
            style="display:grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap:15px;"></div>
        <button class="btn" style="background:#e74c3c; width:100%; margin-top:20px; padding:15px"
            onclick="toggleMarket(false)">BACK</button>
    </div>

            { n: "Alaba", p: "LCB", r: 94, i: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQJGh91JFoipaRgRKo5BZsh8CMcjqugowS4pA&s" },
            { n: "Bernardo Silva", p: "RCM", r: 94, i: "https://img.uefa.com/imgml/TP/players/1/2026/cutoff/250059115.webp" },
            { n: "Courtois", p: "GK", r: 93, i: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRIFjBy1eJFSGsPnFZGeFW848o2MXrv9zooDA&s" }
        ];

        let db = JSON.parse(localStorage.getItem("fc26_final_v2")) || { c: 5000, inv: [], team: {} };
        let penScore = 0;
        let shooting = false;

        function render() {
            document.getElementById("coin").innerText = db.c.toLocaleString();
            const positions = ["LW", "ST", "RW", "LCM", "CM", "RCM", "LB", "LCB", "RCB", "RB", "GK"];
            let totalOvr = 0, count = 0;

            positions.forEach(s => {
                const el = document.getElementById(s);
                if (db.team[s]) {
                    el.innerHTML = createCardHTML(db.team[s]);
                    totalOvr += db.team[s].r; count++;
                    el.onclick = () => { db.inv.push(db.team[s]); delete db.team[s]; render(); };
                } else { el.innerHTML = `<span style="opacity:0.3">${s}</span>`; el.onclick = null; }
            });

            document.getElementById("team-ovr").innerText = `OVR: ${count > 0 ? Math.round(totalOvr / count) : 0}`;
            const invList = document.getElementById("inv-list");
            invList.innerHTML = "";
            db.inv.forEach((p, i) => {
                if (!p.up) p.up = 0;
                const upCost = 500;
                const w = document.createElement("div"); w.className = "inv-item";
                w.innerHTML = `<div style="width:80px;height:110px" onclick="addToTeam(${i})">${createCardHTML(p)}</div>
        <button class="action-btn" style="background:#27ae60" onclick="upgradePlayer(${i})">UP (+2) ${upCost}</button>
        <button class="action-btn" style="background:#e74c3c" onclick="sellPlayer(${i})">SELL 500</button>`;
                invList.appendChild(w);
            });
            localStorage.setItem("fc26_final_v2", JSON.stringify(db));
        }

        function createCardHTML(p) {
            let cl = p.r === 120 ? "card-120" : "";
            let bg = "var(--bg-90)";
            let emoji = "";

            if (p.r >= 120) { bg = "var(--bg-120)"; emoji = "🌈"; cl = "card-120"; }
            else if (p.r === 119) { bg = "var(--bg-119)"; emoji = "🚒"; }
            else if (p.r === 118) { bg = "var(--bg-118)"; emoji = "👑"; }
            else if (p.r === 117) { bg = "var(--bg-117)"; emoji = "🎨"; }
            else if (p.r === 116) { bg = "var(--bg-116)"; emoji = "🎮"; }
            else if (p.r === 115) { bg = "var(--bg-115)"; emoji = "💎"; }
            else if (p.r === 114) { bg = "var(--bg-114)"; emoji = "🧩"; }
            else if (p.r === 113) { bg = "var(--bg-113)"; emoji = "🏆"; }
            else if (p.r === 112) { bg = "var(--bg-112)"; emoji = "💍"; }
            else if (p.r === 111) { bg = "var(--bg-111)"; emoji = "🖼️"; }
            else if (p.r === 110) { bg = "var(--bg-110)"; emoji = "🎊"; }
            else if (p.r >= 100) { bg = "var(--bg-100)"; }

            return `<div class="card ${cl}" style="background:${bg}">
                <div class="card-ovr">${p.r}</div>
                <div class="card-stars">${p.up > 0 ? '★'.repeat(p.up) : ''}</div>
                <div class="card-emoji">${emoji}</div>
                <img src="${p.i}">
                <div class="card-name">${p.n}</div>
            </div>`;
        }

        function upgradePlayer(i) {
            let p = db.inv[i];
            if (p.up >= 5) { alert("Maksimal 5 marta kuchaytirish mumkin!"); return; }
            const cost = 500;
            if (db.c >= cost) { db.c -= cost; p.up++; p.r += 2; render(); } else { alert("Mablag' yetarli emas!"); }
        }

        function startPenalty() { penScore = 0; document.getElementById("pen-score").innerText = "0"; document.getElementById("penalty-modal").style.display = "flex"; }

        function shoot(target) {
            if (shooting) return;
            shooting = true;
            const gk = document.getElementById("gk-player");
            const ball = document.getElementById("game-ball");
            const kMove = Math.floor(Math.random() * 3) + 1;
            const pos = { 1: "15px", 2: "120px", 3: "225px" };
            const bPos = { 1: "30px", 2: "135px", 3: "240px" };

            gk.style.left = pos[kMove];
            ball.style.bottom = "110px";
            ball.style.left = bPos[target];

            setTimeout(() => {
                if (target !== kMove) { penScore++; document.getElementById("pen-score").innerText = penScore; }
                setTimeout(() => {
                    ball.style.bottom = "-110px"; ball.style.left = "135px"; gk.style.left = "120px";
                    shooting = false;
                }, 600);
            }, 400);
        }

        function stopPenalty() {
            let bonus = 0;
            if (penScore >= 5) bonus = 2000;
            else if (penScore >= 3) bonus = 1000;
            else if (penScore >= 1) bonus = 500;

            if (bonus > 0) {
                alert(`${penScore} gol! Bonus: ${bonus} 🪙`);
                db.c += bonus;
            } else {
                alert(`Hech qanday gol urilmadi. Bonus yo'q 🥲`);
            }
            document.getElementById("penalty-modal").style.display = "none";
            render();
        }

        function toggleMarket(show) {
            document.getElementById("market-modal").style.display = show ? "block" : "none";
            if (show) {
                const list = document.getElementById("market-list"); list.innerHTML = "";
                const ratings = [110, 111, 112, 113, 114, 115, 116, 117, 118, 119, 120];
                ratings.forEach(r => {
                    playersData.forEach(base => {
                        const price = r * 150;
                        const d = document.createElement("div");
                        d.innerHTML = `<div style="width:95px;height:125px">${createCardHTML({ ...base, r: r, up: 0 })}</div>
                <button class="action-btn" style="background:var(--gold);color:#000;font-weight:bold;margin-top:4px;" onclick="buyPlayer('${base.n}', ${r}, ${price})">${price} 🪙</button>`;
                        list.appendChild(d);
                    });
                });
            }
        }

        function buyPlayer(n, r, p) { if (db.c >= p) { db.c -= p; db.inv.push({ ...playersData.find(x => x.n === n), r: r, up: 0 }); render(); } else { alert("Mablag' yetarli emas!"); } }

        /* Yangilangan openPack Funksiyasi */
        function openPack() {
            if (db.c >= 1000) {
                db.c -= 1000;
                // Tasodifiy o'yinchini tanlash
                let p = { ...playersData[Math.floor(Math.random() * playersData.length)], up: 0 };

                // Reyting: 91 dan 120 gacha bo'lgan hohlagan raqam (90 dan baland)
                p.r = Math.floor(Math.random() * 30) + 91;

                db.inv.push(p);
                render();
            } else {
                alert("Mablag' yetarli emas!");
            }
        }

        function sellPlayer(i) { db.c += 500; db.inv.splice(i, 1); render(); }

        function addToTeam(i) {
            const p = db.inv[i];
            let slot = "";
            if (p.p === "CM") slot = !db.team.CM ? "CM" : (!db.team.LCM ? "LCM" : (!db.team.RCM ? "RCM" : ""));
            else if (p.p === "CB") slot = !db.team.LCB ? "LCB" : (!db.team.RCB ? "RCB" : "");
            else if (!db.team[p.p]) slot = p.p;
            if (slot) { db.team[slot] = db.inv.splice(i, 1)[0]; render(); }
        }

        function resetGame() { localStorage.clear(); location.reload(); }

        function toggleAdmin(show) { document.getElementById("admin-panel").style.display = show ? "flex" : "none"; }
        function adminSetCoin() { const val = parseInt(document.getElementById("admin-coin-input").value); if (!isNaN(val)) { db.c = val; render(); toggleAdmin(false); } }
        function adminGivePlayer() { db.inv.push({ n: "ADMIN KING", p: "ST", r: 120, up: 0, i: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRjRH2NqzJELJgklZXJeA2-iGdQtzlG_nTrHg&s" }); render(); toggleAdmin(false); }
        function adminClearInv() { db.inv = []; render(); toggleAdmin(false); }

        
        render();
    </script>
